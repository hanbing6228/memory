name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        env:
          AUTH_SECRET: ci-build-secret-min-16-chars
        run: |
          npm ci
          echo 'DATABASE_URL="file:./data/memorial.db"' >> .env
          echo "AUTH_SECRET=$AUTH_SECRET" >> .env
          npx prisma generate
          npx prisma db push
          npm run build
