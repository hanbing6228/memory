# Web service only — Render free tier allows ONE Postgres database per account.
# If you already have nianguichu-db-k7og (or similar), paste its Internal Connection String
# into the web service env var DATABASE_URL. Do NOT add a second free database.
services:
  - type: web
    name: nianguichu
    runtime: node
    plan: free
    region: singapore
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build && npm run seed
    startCommand: npm start
    healthCheckPath: /api/integrations/status
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
