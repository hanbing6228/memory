# Full stack Blueprint: 1 free Postgres + 1 web service (Render allows one free DB per account).
# Web and DB must share the same region — connectionString uses Render private network only.
databases:
  - name: nianguichu-db
    plan: free
    region: oregon
    databaseName: memorial
    user: memorial

services:
  - type: web
    name: nianguichu
    runtime: node
    plan: free
    region: oregon
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npx prisma generate && npx next build
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /api/integrations/status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nianguichu-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
