# Full stack Blueprint: 1 free Postgres + 1 web service (Render allows one free DB per account).
# Fresh start: delete old Blueprint/services first, then Manual Sync or "New Blueprint".
databases:
  - name: nianguichu-db
    plan: free
    databaseName: memorial
    user: memorial

services:
  - type: web
    name: nianguichu
    runtime: node
    plan: free
    region: singapore
    # Build runs without DB access on Render; migrate/seed run in preDeployCommand instead.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npx prisma generate && npx next build
    preDeployCommand: npx prisma migrate deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /api/integrations/status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nianguichu-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
