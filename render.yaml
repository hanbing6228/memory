databases:
  - name: nianguichu-db
    plan: free
    databaseName: memorial
    user: memorial

services:
  - type: web
    name: nianguichu
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build && npm run seed
    startCommand: npm start
    healthCheckPath: /api/integrations/status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nianguichu-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
